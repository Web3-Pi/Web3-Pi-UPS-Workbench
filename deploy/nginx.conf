server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static SPA — no backend, no state. Web Serial runs entirely client-side;
    # HTTPS (required for navigator.serial) terminates at the Dokploy/Traefik
    # proxy in front of this container.

    gzip on;
    gzip_types text/css application/javascript text/javascript image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=300";
    }
}
